include:
  - path: docker-compose.db.yaml

services:
  db-migrate:
    build:
      context: .
      target: production
    restart: 'no'
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate dev
  app:
    container_name: knowledge_hub_prod
    build:
      context: .
      target: production
    restart: on-failure
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - PORT=${PORT}
    ports:
      - '${PORT}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4000/health || exit 1']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
